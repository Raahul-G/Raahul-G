name: Latest Medium Posts Workflow
on:
  schedule:
    # This automatically updates your profile every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually trigger it instantly

permissions:
  contents: write # Double-checks file modification permissions

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@YOUR_MEDIUM_USERNAME"
